<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Parked | Muhammad Hammad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrollbars from the 3D canvas */
            background-color: #0a0a0a;
            color: #ffffff;
        }

        /* 3D Background Container */
        #vanta-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Content Wrapper */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px; /* Gives depth to the 3D card tilt */
        }

        /* Glassmorphism 3D Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4rem 3rem;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
            transition: transform 0.1s ease-out;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Typography */
        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #cccccc;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Dynamic Domain Text Styling */
        #dynamic-domain {
            display: block;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 15px rgba(79, 172, 254, 0.4));
            word-wrap: break-word;
        }

        p {
            font-size: 1.2rem;
            color: #a0a0a0;
            line-height: 1.6;
        }

        .owner-name {
            display: inline-block;
            color: #ffffff;
            font-weight: 700;
            margin-top: 10px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            #dynamic-domain { font-size: 2.2rem; }
            .glass-card { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="container">
        <div class="glass-card" id="tilt-card">
            <h1>Welcome to</h1>
            <span id="dynamic-domain">Loading...</span>
            <p>This domain is currently secured and <br>proudly owned by</p>
            <div class="owner-name">Muhammad Hammad</div>
        </div>
    </div>

    <script>
        // 1. Dynamic Domain Auto-Checker
        document.addEventListener("DOMContentLoaded", () => {
            // Get the current hostname (e.g., "example.com" or "sub.example.com")
            let currentDomain = window.location.hostname;
            
            // Remove 'www.' for a cleaner aesthetic
            currentDomain = currentDomain.replace(/^www\./, '');
            
            // Fallback just in case you are opening it locally via file://
            if (!currentDomain) {
                currentDomain = "local-environment.dev";
            }
            
            // Inject the domain into the HTML
            document.getElementById('dynamic-domain').innerText = currentDomain;
        });

        // 2. Initialize Vanta.js 3D Network Background
        VANTA.NET({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x4facfe,         // Cyan glowing nodes
            backgroundColor: 0x050505, // Deep black background
            points: 12.00,
            maxDistance: 22.00,
            spacing: 18.00
        });

        // 3. 3D Card Hover/Tilt Effect
        const card = document.getElementById('tilt-card');
        const container = document.querySelector('.container');

        container.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            // Temporarily disable the float animation during hover so they don't clash
            card.style.animation = 'none';
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset card to default when mouse leaves
        container.addEventListener('mouseleave', (e) => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = 'transform 0.5s ease';
            // Restart the floating animation after a short delay
            setTimeout(() => {
                card.style.animation = 'float 6s ease-in-out infinite';
            }, 500);
        });

        // Remove transition during mousemove for instant response
        container.addEventListener('mouseenter', (e) => {
            card.style.transition = 'none';
        });
    </script>
</body>
</html>
